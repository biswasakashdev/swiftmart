syntax = "proto3";

package catelogues.v1;

import "google/protobuf/empty.proto";
import "common/v1/main.proto";



option go_package = "github.com/biswasakashdev/swiftmart/catelogues/proto;commonpbv1";


message VariantMessage {
  string id = 1;
  string sku = 2;
  string title = 5;
}

message CreateVariantMessage {
  string sku = 1;
  string title = 4;
}

message ProductMessage {
  string id = 1;
  string title = 2;
  string description = 3;
  string slug = 4;
  string status = 5;
  repeated VariantMessage variants = 6;
}

service ProductsService {
  rpc GetProductById(GetProductByIdRequest) returns (GetProductByIdResponse);

  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);

  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);

  rpc UpdateVariant(UpdateVariantRequest) returns (UpdateVariantResponse);

  rpc AddVariant(AddVariantRequest) returns (AddVariantResponse);
}
// Get product by id.
message GetProductByIdRequest {
  string id = 1;
}

message GetProductByIdResponse {
  ProductMessage product = 1;
}

// Update existing variant
message UpdateVariantRequest {
  string variant_id = 1;
  optional string title = 2;
  optional string sku = 3;
}

message UpdateVariantResponse {
  VariantMessage variant_details = 1;
}
// Create new Product
message CreateProductRequest {
  string title = 1;
  string description = 2;
  string slug = 3;
  repeated CreateVariantMessage variants = 4;
}

message CreateProductResponse {
  google.protobuf.Empty res = 1;
}

// Get products by query.
message ListProductsRequest {
  common.v1.PageInfo page_info = 1;
  string search_query = 2;
}

message ListProductsResponse {
  repeated ProductMessage products = 1;
}

// Add new variant
message AddVariantRequest {
  string product_id = 1;
  repeated CreateVariantMessage variants = 2;
}

message AddVariantResponse {
  repeated VariantMessage variants =1;
}

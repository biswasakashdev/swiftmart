syntax = "proto3";

package products.v1;

import "google/protobuf/empty.proto";

option go_package = "productspb";

message VariantMessage {
  string id = 1;
  string sku = 2;
  double price = 3;
  uint32 inventory_quantity = 4;
  string title = 5;
}

message CreateVariantMessage {
  string sku = 1;
  double price = 2;
  int32 inventory_quantity = 3;
  string title = 4;
}

message ProductResponse {
  string id = 1;
  string title = 2;
  string description = 3;
  string slug = 4;
  string status = 5;
  repeated VariantMessage variants = 6;
}

service ProductsService {
  rpc GetProduct(GetProductRequest) returns (GetProductResponse);

  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);

  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);

  rpc UpdateVariant(UpdateVariantRequest) returns (UpdateVariantResponse);

  rpc AddVariant(AddVariantRequest) returns (AddVariantResponse);
}

message GetProductRequest {
  string id = 1;
}

message GetProductResponse {
  ProductResponse product = 1;
}

message UpdateVariantRequest {
  string variant_id = 1;
  optional int32 quantity_delta = 2;
  optional string title = 3;
  optional uint32 price = 4;
}

message UpdateVariantResponse {
  VariantMessage variant_details = 1;
}

message CreateProductRequest {
  string title = 1;
  string description = 2;
  string slug = 3;
  repeated CreateVariantMessage variants = 4;
}

message CreateProductResponse {
  google.protobuf.Empty res = 1;
}

message ListProductsRequest {
  int32 limit = 1;
  int32 offset = 2;
  string search_query = 3;
}

message ListProductsResponse {
  repeated ProductResponse products = 1;
}

message AddVariantRequest {
  string product_id = 1;
  repeated CreateVariantMessage variants = 2;
}

message AddVariantResponse {
  google.protobuf.Empty res = 1;
}

version: v2
plugins:
  - remote: buf.build/grpc/go:v1.6.2
    out: services/catelogues/proto_gen
    opt:
      - paths=source_relative
  # grpc/go depends on protocolbuffers/go
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: services/catelogues/proto_gen
    opt:
      - paths=source_relative
inputs:
  - directory: .
    paths:
      - proto/catelogues
      - proto/common

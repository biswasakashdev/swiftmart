version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/biswasakashdev/swiftmart/services/gpql-gateway/proto_gen

plugins:
  - remote: buf.build/grpc/go:v1.6.2
    out: services/gpql-gateway/proto_gen
    opt:
      - paths=source_relative
  # grpc/go depends on protocolbuffers/go
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: services/gpql-gateway/proto_gen
    opt:
      - paths=source_relative
inputs:
  - directory: proto
